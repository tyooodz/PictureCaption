<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片字幕生成工具</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="wrapper">
        <h1 class="page-title">图片字幕生成器</h1>
        <div class="container">
        <!-- 左侧控制面板 -->
        <div class="control-panel">
            <!-- 上传图片 -->
            <div class="section">
                <h2>上传图片</h2>
                <div class="upload-button-wrapper">
                    <button class="btn-select" id="uploadBtn" aria-label="选择图片文件">+ 选择图片</button>
                </div>
                <!-- 改进：添加 aria-hidden 属性，隐藏的 input 不应被屏幕阅读器读取 -->
                <input type="file" id="fileInput" accept="image/*" style="display: none;" aria-hidden="true">
                <p class="file-status" id="fileStatus">未选择文件</p>
            </div>

            <!-- 字幕设置 -->
            <div class="section">
                <h2>字幕设置</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>字幕高度</label>
                        <div class="input-group">
                            <input type="number" id="subtitleHeight" value="40" min="20" max="200">
                            <span class="unit">px</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>字体大小</label>
                        <div class="input-group">
                            <input type="number" id="fontSize" value="20" min="10" max="100">
                            <span class="unit">px</span>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>字体颜色</label>
                        <input type="color" id="fontColor" value="#ffffff">
                    </div>
                    <div class="form-group">
                        <label>轮廓颜色</label>
                        <input type="color" id="outlineColor" value="#333333">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>字体样式</label>
                        <select id="fontFamily">
                            <option value="system-ui">系统默认</option>
                            <option value="SimSun">宋体</option>
                            <option value="SimHei">黑体</option>
                            <option value="Microsoft YaHei">微软雅黑</option>
                            <option value="Arial">Arial</option>
                            <option value="Verdana">Verdana</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>字体粗细</label>
                        <select id="fontWeight">
                            <option value="normal">正常</option>
                            <option value="bold">加粗</option>
                            <option value="300">细体</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 字幕内容 -->
            <div class="section">
                <h2>字幕内容</h2>
                <textarea id="subtitleText" placeholder="请输入字幕内容，每行作为一个独立字幕"></textarea>
            </div>

            <!-- 操作按钮 -->
            <div class="section button-group">
                <button class="btn-primary" id="generateBtn">生成字幕图片</button>
                <button class="btn-download" id="saveBtn" disabled>
                    <span>⬇</span> 下载图片
                </button>
            </div>
        </div>

        <!-- 右侧预览区域 -->
        <div class="preview-panel" id="previewPanel">
            <div class="fullscreen-hint" id="fullscreenHint">
                若要退出全屏模式，请按住 <span>Esc</span>
            </div>
            <!-- 改进：为 canvas 添加 aria-label，提升可访问性 -->
            <canvas id="canvas" aria-label="生成的字幕图片预览"></canvas>
            <div class="placeholder" id="placeholder">
                <svg viewBox="0 0 100 100" width="60" height="60" aria-hidden="true">
                    <rect x="10" y="10" width="80" height="80" fill="none" stroke="#ccc" stroke-width="2"/>
                    <circle cx="30" cy="30" r="8" fill="#ccc"/>
                    <path d="M 10 90 L 40 50 L 70 80 L 90 50" fill="none" stroke="#ccc" stroke-width="2"/>
                </svg>
                <p>请先上传图片并生成字幕</p>
            </div>
        </div>
    </div>

    <!-- 改进：添加 toast 通知容器，用于显示错误和成功消息 -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
